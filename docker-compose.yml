name: "WorkLog"
services:
  backend:
    image: worklog_backend
    build:
      context: ./back
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npx prisma db push && npx prisma db seed && npm run start"

  frontend:
    image: worklog_frontend
    build:
      context: ./front
    ports:
      - "4173:4173"
    depends_on:
      - backend

  mysql:
    image: mysql:latest
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  mysql-data:
